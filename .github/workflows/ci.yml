# Managed by oss-scaffold (override) — see .scaffoldrc.json.
# Profile: node-npm-lib. This file is listed under "overrides" so local edits
# do not fail the drift-check job.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-lint:
    # This repo produces browser bundles (editor + mcptoolkit-viewer). The
    # Node.js version only affects the build toolchain (Vite, tsc, npm) — no
    # Node.js runtime API surface is exercised — so a single LTS version is
    # sufficient.
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build editor
        run: npm run build

      - name: Build mcptoolkit-viewer
        run: npm run build --workspace=packages/mcptoolkit-viewer

      - name: Lint
        run: npm run lint

  scaffold-drift:
    name: Scaffold Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Verify managed files match the vendored oss-scaffold
        run: node .github/skills/oss-scaffold/scripts/check.mjs --ci
