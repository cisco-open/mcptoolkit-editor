# Managed by oss-scaffold (override) — see .scaffoldrc.json. This file is listed
# under "overrides" so local edits do not fail the drift-check job. It is
# intentionally retargeted from the scaffold default `v*` to the `viewer-v*` tag
# prefix so the viewer versions independently of the other workspace packages.
# Profile: node-npm-lib, npmAuth: token.
name: Publish to npm

on:
  push:
    tags:
      - 'viewer-v*'

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mcptoolkit-viewer
        run: npm run build --workspace=packages/mcptoolkit-viewer

      - name: Verify tag matches package.json and select dist-tag
        id: release
        run: |
          PKG_VERSION="$(node -p "require('./packages/mcptoolkit-viewer/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#viewer-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match packages/mcptoolkit-viewer/package.json version '${PKG_VERSION}'"
            exit 1
          fi
          # Pre-release versions (e.g. 1.0.0-rc.5) publish under the 'next'
          # dist-tag so `npm install` keeps serving the latest stable release.
          if printf '%s' "$PKG_VERSION" | grep -q '-'; then
            DIST_TAG=next
          else
            DIST_TAG=latest
          fi
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${PKG_VERSION} under dist-tag '${DIST_TAG}'"

      - name: Publish
        run: npm publish --workspace=packages/mcptoolkit-viewer --provenance --access public --tag "${{ steps.release.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
